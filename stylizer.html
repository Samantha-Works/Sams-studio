<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stylizer — SRL Identity Studio</title>
<style>
:root{--bg:#07000f;--panel:#13051f;--panel2:#1d0a31;--line:#7d3cff55;--text:#fff;--muted:#c9b9df;--hot:#c65cff;--violet:#7a3cff;--pink:#ff5ee7;--blue:#5ecbff;}
*{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#311056 0,#090011 42%,#030006 100%);color:var(--text);min-height:100vh;overflow-x:hidden}.stars{position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(#fff8 1px,transparent 1px),radial-gradient(#b66cff88 1px,transparent 1px);background-size:42px 42px,77px 77px;opacity:.22}.app{position:relative;z-index:1;max-width:1280px;margin:auto;padding:18px}.top{display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:16px}.brand{display:flex;gap:14px;align-items:center}.logo{width:58px;height:58px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#fff,#ce8cff 24%,#8b38ff 54%,#27004c 100%);box-shadow:0 0 30px #b65cff,0 0 70px #6f1cff;display:grid;place-items:center;font-size:27px}.brand h1{font-size:clamp(28px,5vw,58px);line-height:.9;margin:0;background:linear-gradient(90deg,#fff,#d49cff,#ff62ec);-webkit-background-clip:text;color:transparent;letter-spacing:-2px}.brand p{margin:4px 0 0;color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:linear-gradient(135deg,#7d3cff,#d64fff);color:white;border-radius:14px;padding:11px 14px;font-weight:800;cursor:pointer;box-shadow:0 0 18px #8b38ff55}.btn.secondary{background:#180724}.btn.warn{background:linear-gradient(135deg,#ff5e9e,#8b38ff)}.grid{display:grid;grid-template-columns:350px 1fr;gap:16px}@media(max-width:900px){.grid{grid-template-columns:1fr}.app{padding:12px}.actions{width:100%}.btn{flex:1}.previewWrap{min-height:430px}}.card{background:linear-gradient(180deg,#170824dd,#0d0317dd);border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 18px 50px #0008, inset 0 0 40px #a04cff12;backdrop-filter:blur(12px)}.card h2{margin:0 0 12px;color:#e6ccff;font-size:20px}.field{margin:10px 0}.field label{display:block;color:#d9c4ee;font-size:13px;font-weight:800;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;background:#08020f;border:1px solid #7d3cff77;color:white;border-radius:12px;padding:10px;outline:none}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.range{accent-color:#c65cff}.previewWrap{position:relative;min-height:620px;display:grid;place-items:center;overflow:hidden}.canvasStage{width:min(92vw,600px);height:min(92vw,600px);max-height:600px;position:relative;display:grid;place-items:center;background:radial-gradient(circle,#3f176955 0,#0b0210 55%,transparent 72%);border-radius:34px}.orb{position:relative;width:310px;height:310px;border-radius:50%;background:radial-gradient(circle at 34% 24%,#fff 0,#f4d9ff 10%,#c988ff 27%,#8336ff 56%,#23004a 100%);box-shadow:0 0 28px var(--hot),0 0 80px #8b38ff,0 0 130px #5d10ff;transform:scale(var(--scale,1));transition:.2s}.orb:before{content:"";position:absolute;inset:-28px;border-radius:50%;background:radial-gradient(circle,#c65cff66,transparent 68%);filter:blur(12px);z-index:-1}.hair{position:absolute;left:45px;top:14px;width:220px;height:96px;border-radius:60% 60% 45% 45%;background:linear-gradient(135deg,#18000c,#5b225f,#b867ff);box-shadow:inset 0 -16px 25px #0007;clip-path:polygon(0 18%,18% 0,35% 18%,52% 2%,68% 19%,87% 0,100% 30%,94% 88%,7% 100%)}.bang{position:absolute;top:72px;width:34px;height:78px;background:linear-gradient(#5b225f,#14000c);border-radius:0 0 20px 20px}.bang.l{left:62px;transform:rotate(18deg)}.bang.r{right:58px;transform:rotate(-16deg)}.face{position:absolute;inset:0}.eye{position:absolute;top:122px;width:58px;height:72px;background:#11001d;border-radius:50%;box-shadow:inset 8px 8px 0 #fff,0 0 12px #fff5}.eye.l{left:84px}.eye.r{right:84px}.eye.sleep{height:16px;border-radius:40px;top:148px;background:#17001f;box-shadow:none}.brow{position:absolute;top:104px;width:58px;height:12px;border-radius:12px;background:#17001f}.brow.l{left:82px}.brow.r{right:82px}.mouth{position:absolute;left:50%;top:214px;transform:translateX(-50%);width:82px;height:42px;border:8px solid #18001e;border-top:0;border-radius:0 0 60px 60px}.mouth.sad{border:8px solid #18001e;border-bottom:0;border-radius:60px 60px 0 0;top:225px}.mouth.o{width:48px;height:58px;border:8px solid #18001e;border-radius:50%;top:208px}.mouth.line{width:80px;height:9px;border:0;background:#18001e;border-radius:20px;top:235px}.cheek{position:absolute;top:198px;width:44px;height:20px;border-radius:50%;background:#ff78d655;filter:blur(1px);display:var(--cheeks,block)}.cheek.l{left:52px}.cheek.r{right:52px}.body{position:absolute;top:320px;width:260px;height:255px;border-radius:95px 95px 42px 42px;background:linear-gradient(180deg,#48216e,#13051f);border:1px solid #b66cff66;box-shadow:0 0 55px #8b38ff88;display:none}.body.on{display:block}.outfit{position:absolute;inset:58px 36px 0;border-radius:48px 48px 34px 34px;background:linear-gradient(135deg,var(--outfit1,#2a0845),var(--outfit2,#d64fff));}.arm{position:absolute;top:75px;width:58px;height:150px;border-radius:35px;background:linear-gradient(#a76cff,#35085a)}.arm.l{left:-32px;transform:rotate(16deg)}.arm.r{right:-32px;transform:rotate(-16deg)}.pack{display:grid;grid-template-columns:repeat(auto-fit,minmax(112px,1fr));gap:10px}.mini{border:1px solid #7d3cff55;background:#08020f;border-radius:18px;padding:10px;text-align:center;cursor:pointer}.miniOrb{width:70px;height:70px;border-radius:50%;margin:0 auto 8px;background:radial-gradient(circle at 34% 24%,#fff,#c988ff 25%,#8336ff 58%,#23004a);box-shadow:0 0 18px #b65cff;display:grid;place-items:center;font-size:30px}.mini span{font-size:12px;color:#d9c4ee;font-weight:800}.footer{text-align:center;color:#a995c0;padding:20px}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#170824;border:1px solid #b66cff77;padding:12px 18px;border-radius:99px;box-shadow:0 0 30px #8b38ff88;display:none;z-index:9}.toast.show{display:block}.hiddenCanvas{display:none}
</style>
</head>
<body>
<div class="stars"></div><div class="app"><div class="top"><div class="brand"><div class="logo">💜</div><div><h1>Stylizer</h1><p>AI Identity & Expression Studio • © 2026 SRL - S.R.Langlois</p></div></div><div class="actions"><button class="btn" id="downloadPng">Download PNG</button><button class="btn secondary" id="downloadPack">Download Pack</button><button class="btn warn" id="saveProject">Save</button></div></div><div class="grid"><section class="card"><h2>Creator Controls</h2><div class="field"><label>Name</label><input id="charName" value="SuperNova Orb" /></div><div class="row"><div class="field"><label>Expression</label><select id="expression"><option>Happy</option><option>Thinking</option><option>Focused</option><option>Excited</option><option>Curious</option><option>Frustrated</option><option>Sleepy</option><option>Surprised</option><option>Confident</option><option>Loving</option></select></div><div class="field"><label>Mode</label><select id="mode"><option>Orb</option><option>Full Body</option></select></div></div><div class="row"><div class="field"><label>Hair Style</label><select id="hairStyle"><option>Cosmic Waves</option><option>Short Glow</option><option>Long Glow</option><option>Hidden</option></select></div><div class="field"><label>Outfit</label><select id="outfit"><option>Cosmic Hoodie</option><option>Studio Jacket</option><option>Creator Suit</option><option>Neon Armor</option></select></div></div><div class="field"><label>Glow Strength</label><input class="range" id="glow" type="range" min="10" max="100" value="70"></div><div class="field"><label>Size</label><input class="range" id="scale" type="range" min="70" max="120" value="100"></div><div class="field"><label><input id="cheeks" type="checkbox" checked> Cheeks</label></div><div class="field"><label>Quick Prompt / Notes</label><textarea id="notes" rows="3" placeholder="Example: purple cosmic assistant, confident expression, hoodie..."></textarea></div><button class="btn" style="width:100%" id="applyBtn">Apply Style</button></section><section class="card previewWrap"><div class="canvasStage" id="captureArea"><div class="body" id="body"><div class="outfit" id="outfitShape"></div><div class="arm l"></div><div class="arm r"></div></div><div class="orb" id="orb"><div class="hair" id="hair"></div><div class="bang l"></div><div class="bang r"></div><div class="face"><div class="brow l" id="browL"></div><div class="brow r" id="browR"></div><div class="eye l" id="eyeL"></div><div class="eye r" id="eyeR"></div><div class="cheek l"></div><div class="cheek r"></div><div class="mouth" id="mouth"></div></div></div></div></section></div><section class="card" style="margin-top:16px"><h2>Expression Pack</h2><div class="pack" id="pack"></div></section><div class="footer">Stylizer • Downloadable PNG pack foundation • saved locally in your browser</div></div><canvas id="exportCanvas" class="hiddenCanvas" width="1024" height="1024"></canvas><div class="toast" id="toast">Saved</div>
<script>
const state={expression:'Happy',mode:'Orb',hairStyle:'Cosmic Waves',outfit:'Cosmic Hoodie',glow:70,scale:100,cheeks:true};
const exprs=['Happy','Thinking','Focused','Excited','Curious','Frustrated','Sleepy','Surprised','Confident','Loving'];
const $=id=>document.getElementById(id);function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1600)}
function render(){Object.assign(state,{expression:$('expression').value,mode:$('mode').value,hairStyle:$('hairStyle').value,outfit:$('outfit').value,glow:+$('glow').value,scale:+$('scale').value,cheeks:$('cheeks').checked});let orb=$('orb'),body=$('body'),mouth=$('mouth'),eyeL=$('eyeL'),eyeR=$('eyeR'),browL=$('browL'),browR=$('browR'),hair=$('hair');orb.style.boxShadow=`0 0 ${state.glow/2}px #c65cff,0 0 ${state.glow}px #8b38ff,0 0 ${state.glow*1.5}px #5d10ff`;orb.style.setProperty('--scale',state.scale/100);orb.style.setProperty('--cheeks',state.cheeks?'block':'none');body.classList.toggle('on',state.mode==='Full Body');hair.style.display=state.hairStyle==='Hidden'?'none':'block';document.querySelectorAll('.bang').forEach(b=>b.style.display=state.hairStyle==='Hidden'?'none':'block');mouth.className='mouth';eyeL.className='eye l';eyeR.className='eye r';browL.style.transform='rotate(0deg)';browR.style.transform='rotate(0deg)';browL.style.display=browR.style.display='block';if(state.expression==='Thinking'){mouth.className='mouth line';browL.style.transform='rotate(-12deg)';browR.style.transform='rotate(12deg)'}if(state.expression==='Focused'){mouth.className='mouth line';browL.style.transform='rotate(14deg)';browR.style.transform='rotate(-14deg)'}if(state.expression==='Excited'){mouth.style.height='58px'}if(state.expression==='Curious'){mouth.className='mouth o';browL.style.transform='rotate(-10deg)'}if(state.expression==='Frustrated'){mouth.className='mouth sad';browL.style.transform='rotate(18deg)';browR.style.transform='rotate(-18deg)'}if(state.expression==='Sleepy'){eyeL.className='eye l sleep';eyeR.className='eye r sleep';mouth.className='mouth line';browL.style.display=browR.style.display='none'}if(state.expression==='Surprised'){mouth.className='mouth o'}if(state.expression==='Confident'){mouth.className='mouth line';browL.style.transform='rotate(-10deg)';browR.style.transform='rotate(-10deg)'}if(state.expression==='Loving'){mouth.style.height='50px';orb.style.background='radial-gradient(circle at 34% 24%,#fff,#ffd5ff 10%,#ff91ef 28%,#9a36ff 58%,#23004a 100%)'}else{orb.style.background='radial-gradient(circle at 34% 24%,#fff 0,#f4d9ff 10%,#c988ff 27%,#8336ff 56%,#23004a 100%)'}const colors={"Cosmic Hoodie":['#2a0845','#d64fff'],"Studio Jacket":['#08020f','#7d3cff'],"Creator Suit":['#141414','#b66cff'],"Neon Armor":['#1b0d3d','#5ecbff']};let c=colors[state.outfit];$('outfitShape').style.setProperty('--outfit1',c[0]);$('outfitShape').style.setProperty('--outfit2',c[1]);}
function drawAvatar(expression=state.expression){const c=$('exportCanvas'),ctx=c.getContext('2d');ctx.clearRect(0,0,1024,1024);let g=ctx.createRadialGradient(512,512,30,512,512,470);g.addColorStop(0,'#ffffff');g.addColorStop(.13,'#efd5ff');g.addColorStop(.35,'#b66cff');g.addColorStop(.72,'#6e22e8');g.addColorStop(1,'#210041');ctx.fillStyle='#050008';ctx.fillRect(0,0,1024,1024);ctx.shadowColor='#a84cff';ctx.shadowBlur=70;ctx.fillStyle=g;ctx.beginPath();ctx.arc(512,455,285,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#190020';ctx.beginPath();ctx.ellipse(410,425,52,68,0,0,Math.PI*2);ctx.ellipse(614,425,52,68,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(392,398,15,0,Math.PI*2);ctx.arc(596,398,15,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#190020';ctx.lineWidth=20;ctx.lineCap='round';ctx.beginPath();if(['Frustrated','Focused'].includes(expression)){ctx.moveTo(350,335);ctx.lineTo(455,365);ctx.moveTo(670,335);ctx.lineTo(565,365)}else if(expression==='Thinking'){ctx.moveTo(350,345);ctx.lineTo(450,330);ctx.moveTo(575,330);ctx.lineTo(675,350)}else{ctx.moveTo(360,342);ctx.lineTo(455,342);ctx.moveTo(570,342);ctx.lineTo(665,342)}ctx.stroke();ctx.strokeStyle='#190020';ctx.lineWidth=24;ctx.beginPath();if(expression==='Frustrated'){ctx.arc(512,610,80,Math.PI,0)}else if(['Surprised','Curious'].includes(expression)){ctx.ellipse(512,585,44,58,0,0,Math.PI*2)}else if(['Thinking','Focused','Confident','Sleepy'].includes(expression)){ctx.moveTo(462,610);ctx.lineTo(562,610)}else{ctx.arc(512,575,90,0,Math.PI)}ctx.stroke();if(state.cheeks){ctx.fillStyle='#ff78d655';ctx.beginPath();ctx.ellipse(315,555,58,25,0,0,Math.PI*2);ctx.ellipse(710,555,58,25,0,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#ffffffcc';ctx.font='bold 34px Arial';ctx.textAlign='center';ctx.fillText('© 2026 SRL - S.R.Langlois',512,950);return c.toDataURL('image/png')}
function download(name,data){const a=document.createElement('a');a.href=data;a.download=name;a.click()}
$('downloadPng').onclick=()=>download(`stylizer-${state.expression}.png`,drawAvatar());$('downloadPack').onclick=()=>{exprs.forEach((e,i)=>setTimeout(()=>download(`stylizer-${e}.png`,drawAvatar(e)),i*220));toast('Downloading expression pack')};$('saveProject').onclick=()=>{localStorage.setItem('stylizerProject',JSON.stringify({...state,name:$('charName').value,notes:$('notes').value}));toast('Project saved')};$('applyBtn').onclick=()=>{render();toast('Style applied')};['expression','mode','hairStyle','outfit','glow','scale','cheeks'].forEach(id=>$(id).addEventListener('input',render));function pack(){let p=$('pack');p.innerHTML='';exprs.forEach(e=>{let d=document.createElement('div');d.className='mini';d.innerHTML=`<div class="miniOrb">${e==='Happy'?'😊':e==='Thinking'?'🤔':e==='Focused'?'🎯':e==='Excited'?'✨':e==='Curious'?'😮':e==='Frustrated'?'😤':e==='Sleepy'?'😴':e==='Surprised'?'😲':e==='Confident'?'😏':'💜'}</div><span>${e}</span>`;d.onclick=()=>{$('expression').value=e;render();};p.appendChild(d)})}pack();const saved=localStorage.getItem('stylizerProject');if(saved){try{const s=JSON.parse(saved);Object.keys(s).forEach(k=>{if($(k))$(k).type==='checkbox'?$(k).checked=s[k]:$(k).value=s[k]});}catch(e){}}render();
</script>
</body></html>
